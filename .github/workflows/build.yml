name: Build Succeeds on PR

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
  name: Build the projects
  runs-on: ubuntu-latest

steps:
    uses: actions/checkout@v3
    name: Uses node.js
    uses: actions/setup-node@v3
    with:
      node-version: '20'

    name: Install dependencies
    run: npm install

    name: Build the project
    run: npm run build